name: Astro CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Astro CLI
        run: |
          curl -sSL install.astronomer.io | sudo bash -s

      - name: Parse DAGs (Astro Parse)
        run: |
          astro dev parse
